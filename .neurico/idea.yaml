idea:
  title: Narrative Space in LLMs
  domain: artificial_intelligence
  hypothesis: 'When large language models (LLMs) are asked to write stories involving
    spatial navigation, such as moving through a building, they may diverge from human
    narrative patterns in systematic ways. There may exist a distinct "grammar" of
    spatial narratives in LLM-generated stories, analogous to the sentence structure
    tendencies observed in RLHF-trained models.

    '
  background:
    description: 'This idea explores whether LLMs, when generating stories about moving
      through space (e.g., navigating a building), differ from humans in their narrative
      structure. It draws an analogy to how RLHF-trained models exhibit characteristic
      sentence structures, suggesting that LLMs might also have a unique grammar for
      spatial narratives.

      '
